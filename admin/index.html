<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>J-TECH Admin - Quản lý bài viết</title>
    <!-- Include Quill stylesheet -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f3f4f6;
            margin: 0;
            padding: 20px;
            color: #1f2937;
        }

        .dashboard {
            display: flex;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .sidebar {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }

        .main-content {
            flex: 2;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }

        h1,
        h2 {
            color: #2563eb;
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Post List */
        .post-item {
            border-bottom: 1px solid #e5e7eb;
            padding: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .post-item:last-child {
            border-bottom: none;
        }

        .post-info h4 {
            margin: 0 0 5px 0;
            font-size: 16px;
            color: #1f2937;
        }

        .post-meta {
            font-size: 12px;
            color: #6b7280;
        }

        .post-actions button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            margin-left: 5px;
            font-size: 16px;
            border-radius: 4px;
        }

        .btn-edit {
            color: #2563eb;
        }

        .btn-edit:hover {
            background: #eff6ff;
        }

        .btn-delete {
            color: #dc2626;
        }

        .btn-delete:hover {
            background: #fef2f2;
        }

        .btn-new {
            width: 100%;
            background: #10b981;
            color: white;
            border: none;
            padding: 10px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .btn-new:hover {
            background: #059669;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #4b5563;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }

        #editor-container {
            height: 400px;
            background: white;
            border-bottom-left-radius: 6px;
            border-bottom-right-radius: 6px;
        }

        .btn-submit {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background: #1d4ed8;
        }

        .status {
            margin-top: 15px;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }

        .status.success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }

        .status.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }

        /* Toast Notification */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            min-width: 250px;
            background: white;
            border-left: 4px solid #10b981;
            padding: 16px 20px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            font-weight: 500;
            color: #1f2937;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            border-left-color: #10b981;
        }

        .toast.success i {
            color: #10b981;
            font-size: 20px;
        }

        .toast.error {
            border-left-color: #ef4444;
        }

        .toast.error i {
            color: #ef4444;
            font-size: 20px;
        }
    </style>
</head>

<body>
    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <div class="dashboard">
        <!-- Sidebar: List of posts -->
        <div class="sidebar">
            <h2><i class="fa-solid fa-list"></i> Bài Viết Đã Đăng</h2>
            <button class="btn-new" onclick="createNewPost()"><i class="fa-solid fa-plus"></i> Viết Bài Mới</button>
            <div id="posts-list">
                <!-- Posts will be loaded here -->
            </div>
        </div>

        <!-- Main Content: Editor -->
        <div class="main-content">
            <h1 id="form-title"><i class="fa-solid fa-pen-to-square"></i> Đăng Bài Viết Mới</h1>

            <input type="hidden" id="postId" value="">

            <div class="form-group">
                <label for="title">Tiêu đề bài viết</label>
                <input type="text" id="title" placeholder="Nhập tiêu đề...">
            </div>

            <div class="form-group" style="display: flex; gap: 20px;">
                <div style="flex: 1;">
                    <label for="category">Danh mục</label>
                    <select id="category" style="cursor: pointer;">
                        <option value="Tin công nghệ">Tin công nghệ</option>
                        <option value="Giải pháp">Giải pháp</option>
                        <option value="Dịch vụ">Dịch vụ</option>
                        <option value="Khác">Khác</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label for="author">Tác giả</label>
                    <input type="text" id="author" value="Nguyễn Duy Tân">
                </div>
                <div style="flex: 1;">
                    <label for="thumbnail">Link ảnh (URL)</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="thumbnail" placeholder="https://..." style="flex: 1;">
                        <button class="btn-submit"
                            style="padding: 10px; border-radius: 6px; white-space: nowrap; font-size: 14px;"
                            onclick="document.getElementById('imageUpload').click()"><i class="fa-solid fa-upload"></i>
                            Tải ảnh</button>
                        <input type="file" id="imageUpload" accept="image/*" style="display: none;"
                            onchange="uploadImage(event)">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Nội dung bài viết</label>
                <!-- Quill Editor Container -->
                <div id="editor-container"></div>
            </div>

            <button class="btn-submit" onclick="submitPost()">
                <i class="fa-solid fa-cloud-arrow-up"></i> <span id="btn-text">Lưu và Đăng Bài</span>
            </button>

            <div id="statusMsg" class="status"></div>
        </div>
    </div>

    <!-- Include the Quill library -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        var quill = new Quill('#editor-container', {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'color': [] }, { 'background': [] }],
                    [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                    ['link', 'image'],
                    ['clean']
                ]
            }
        });

        // Toast Function
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? '<i class="fa-solid fa-circle-check"></i>' : '<i class="fa-solid fa-circle-exclamation"></i>';
            toast.innerHTML = `${icon} <span>${message}</span>`;

            container.appendChild(toast);

            // Trigger animation
            setTimeout(() => toast.classList.add('show'), 10);

            // Remove after 3 seconds
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Load posts on startup
        async function loadPosts() {
            const res = await fetch('/api/posts');
            const posts = await res.json();
            const list = document.getElementById('posts-list');
            list.innerHTML = '';

            if (posts.length === 0) {
                list.innerHTML = '<p style="color:#6b7280; font-style:italic;">Chưa có bài viết nào.</p>';
                return;
            }

            posts.forEach(post => {
                const item = document.createElement('div');
                item.className = 'post-item';
                item.innerHTML = `
                    <div class="post-info">
                        <h4>${post.title}</h4>
                        <div class="post-meta">${post.category} | ${post.dateStr}</div>
                    </div>
                    <div class="post-actions">
                        <button class="btn-edit" onclick="editPost('${post.id}')" title="Sửa bài"><i class="fa-solid fa-pen"></i></button>
                        <button class="btn-delete" onclick="deletePost('${post.id}')" title="Xóa bài"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        async function uploadImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('image', file);

            const btn = event.target.previousElementSibling;
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('thumbnail').value = data.url;
                } else {
                    alert('Lỗi tải ảnh: ' + (data.error || 'Unknown error'));
                }
            } catch (err) {
                alert('Lỗi: ' + err.message);
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
                event.target.value = ''; // Reset input
            }
        }

        function createNewPost() {
            document.getElementById('form-title').innerHTML = '<i class="fa-solid fa-pen-to-square"></i> Đăng Bài Viết Mới';
            document.getElementById('btn-text').innerText = 'Lưu và Đăng Bài';
            document.getElementById('postId').value = '';
            document.getElementById('title').value = '';
            document.getElementById('category').value = 'Tin công nghệ';
            document.getElementById('author').value = 'Nguyễn Duy Tân';
            document.getElementById('thumbnail').value = '';
            quill.setContents([]);
            document.getElementById('statusMsg').style.display = 'none';
        }

        async function editPost(id) {
            const res = await fetch(`/api/posts/${id}`);
            if (!res.ok) return alert("Không thể tải bài viết");
            const post = await res.json();

            document.getElementById('form-title').innerHTML = '<i class="fa-solid fa-pen-to-square"></i> Sửa Bài Viết';
            document.getElementById('btn-text').innerText = 'Cập Nhật Bài Viết';

            document.getElementById('postId').value = post.id;
            document.getElementById('title').value = post.title;
            document.getElementById('category').value = post.category || 'Tin công nghệ';
            document.getElementById('author').value = post.author;
            document.getElementById('thumbnail').value = post.thumbnail;

            // Paste HTML to Quill
            quill.clipboard.dangerouslyPasteHTML(post.content);
            document.getElementById('statusMsg').style.display = 'none';
        }

        async function deletePost(id) {
            if (!confirm("Bạn có chắc chắn muốn xóa bài viết này không? Tác vụ này không thể hoàn tác.")) return;

            await fetch(`/api/posts/${id}`, { method: 'DELETE' });
            loadPosts();

            if (document.getElementById('postId').value === id) {
                createNewPost();
            }
        }

        async function submitPost() {
            const id = document.getElementById('postId').value;
            const title = document.getElementById('title').value;
            const category = document.getElementById('category').value;
            const author = document.getElementById('author').value;
            const thumbnail = document.getElementById('thumbnail').value;
            const content = quill.root.innerHTML;

            if (!title) {
                alert("Vui lòng nhập tiêu đề!");
                return;
            }

            const btn = document.querySelector('.btn-submit');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang xử lý...';
            btn.disabled = true;

            const url = id ? `/api/posts/${id}` : '/api/posts';
            const method = id ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, category, author, thumbnail, content })
                });

                const result = await response.json();
                const statusDiv = document.getElementById('statusMsg');

                if (response.ok) {
                    showToast(id ? 'Cập nhật bài viết thành công!' : 'Đăng bài viết mới thành công!', 'success');
                    statusDiv.className = 'status success';
                    statusDiv.innerHTML = `<strong>Thành công!</strong> Đã lưu bài viết. Hãy chạy lệnh deploy Vercel để public.`;

                    if (!id) {
                        // Reset form if it was a new post
                        createNewPost();
                    }
                    loadPosts();
                } else {
                    throw new Error(result.error || "Có lỗi xảy ra");
                }
            } catch (err) {
                const statusDiv = document.getElementById('statusMsg');
                statusDiv.className = 'status error';
                statusDiv.innerHTML = `<strong>Lỗi:</strong> ${err.message}`;
                showToast('Lỗi: ' + err.message, 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // Init
        loadPosts();
    </script>
</body>

</html>
